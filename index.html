<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: black;
      text-align: center;
      padding: 50px;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    audio {
      margin-top: 20px;
      width: 80%;
    }
  </style>
</head>
<body>

  <h1>ebert's musik playa</h1>

  <select id="songList">
    <option>Loading songs...</option>
  </select>
  <br>

  <button onclick="playSong()">Play</button>

  <br>

  <audio id="audioPlayer" controls></audio>

  <script>
    const repoOwner = "sigmapoopyman69";
    const repoName = "RGT-Musik-";
    const folder = "music";

    const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folder}`;

    async function loadSongs() {
      const response = await fetch(apiUrl);
      const data = await response.json();

      const songList = document.getElementById("songList");
      songList.innerHTML = "";

      data.forEach(file => {
        if (file.type === "file") {
          const option = document.createElement("option");
          option.value = file.name;
          option.textContent = file.name;
          songList.appendChild(option);
        }
      });
    }

    function playSong() {
      const song = document.getElementById("songList").value;
      const player = document.getElementById("audioPlayer");

      player.src = `https://${repoOwner}.github.io/${repoName}/music/${song}`;
      player.play();
    }

    loadSongs();
  </script>

</body>
</html>
